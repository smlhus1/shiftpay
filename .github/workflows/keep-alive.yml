name: Keep Supabase alive

on:
  schedule:
    # Every 5 days at 06:00 UTC — well within the 7-day pause window
    - cron: '0 6 */5 * *'
  workflow_dispatch: # manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping OCR endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.SUPABASE_OCR_URL }}" \
            -H "X-API-Key: ping" \
            -H "Content-Type: multipart/form-data")
          echo "OCR endpoint returned: $STATUS"
          # 401 = alive and rejecting bad key (expected)
          # 400 = alive
          # 000 or 5xx = problem
          if [ "$STATUS" -eq 0 ] || [ "$STATUS" -ge 500 ]; then
            echo "::warning::Supabase may be down (HTTP $STATUS)"
            exit 1
          fi
          echo "Supabase is alive"
